version: '3.8'

services:
  db:
    image: postgres:15
    container_name: loles-db
    restart: always
    env_file:
      - .env
    ports:
      # Safe port to avoid conflicts
      - "5434:5432"
    volumes:
      - loles_pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: loles-app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      # Using 3055 locally on the laptop to avoid conflicts with other apps on 3000
      - "3055:3000"
    # Wait for the DB to be ready, then push Prisma schema before starting
    command: >
      sh -c "npx prisma db push --accept-data-loss && npm start"

volumes:
  loles_pgdata:
